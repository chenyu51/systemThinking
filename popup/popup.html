<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemCanvas - 新建或打开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #d5dbdb;
            transform: translateY(-2px);
        }

        .btn-tertiary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-tertiary:hover {
            background: #f0f4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📊</div>
        <h1>SystemCanvas</h1>
        <p>轻量级系统思维可视化工具</p>
        
        <div class="button-group">
            <button class="btn-primary" id="popupBtnNew">
                + 新建画布
            </button>
            <button class="btn-secondary" id="popupBtnRecent">
                📂 打开最近的画布
            </button>
            <button class="btn-tertiary" id="popupBtnTemplates">
                📋 选择模板
            </button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
